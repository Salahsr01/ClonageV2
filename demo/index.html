<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Clonage — Demo madeinevolve → Atelier Noma</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #0a0a0a; color: #e0e0e0; }
  header { padding: 20px 32px; background: #111; border-bottom: 1px solid #222; display: flex; align-items: center; justify-content: space-between; gap: 24px; flex-wrap: wrap; }
  header h1 { font-size: 18px; font-weight: 600; letter-spacing: -0.01em; }
  .subtitle { font-size: 13px; color: #888; margin-left: 8px; }
  nav { display: flex; gap: 4px; }
  nav button { padding: 8px 14px; border-radius: 6px; border: 1px solid #333; background: #1a1a1a; color: #e0e0e0; font-size: 13px; cursor: pointer; font-family: inherit; }
  nav button:hover { background: #252525; border-color: #444; }
  nav button.active { background: #4a9eff; border-color: #4a9eff; color: #000; font-weight: 600; }
  main { height: calc(100vh - 65px); display: grid; grid-template-columns: 1fr 1fr; gap: 1px; background: #222; overflow: hidden; }
  main.single { grid-template-columns: 1fr; }
  .pane { background: #111; display: flex; flex-direction: column; overflow: hidden; }
  .pane-label { padding: 8px 16px; font-size: 12px; color: #888; background: #161616; border-bottom: 1px solid #222; display: flex; justify-content: space-between; }
  .pane-label .tag { padding: 2px 8px; border-radius: 3px; font-size: 10px; font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase; }
  .pane-label .tag.source { background: #332; color: #ffc; }
  .pane-label .tag.rebrand { background: #234; color: #8cf; }
  iframe { flex: 1; border: none; background: white; }
  .info { padding: 12px 16px; background: #161616; color: #888; font-size: 12px; line-height: 1.5; }
  .info strong { color: #e0e0e0; }
  .info code { background: #222; padding: 2px 5px; border-radius: 3px; color: #4a9eff; font-size: 11px; }
</style>
</head>
<body>
<header>
  <div>
    <h1>🎨 Clonage Rebrand Demo <span class="subtitle">madeinevolve.com → Atelier Noma</span></h1>
  </div>
  <nav>
    <button data-view="split" class="active">Split (côte à côte)</button>
    <button data-view="source">Source clone</button>
    <button data-view="rebrand">Rebrand Noma</button>
  </nav>
</header>

<div class="info">
  <strong>259 substitutions</strong> appliquées en &lt;1s, zéro LLM. Transformers: <code>brand</code> 3 ·
  <code>palette</code> 146 · <code>typography</code> 87 · <code>copy</code> 23 · <code>images</code> 0.
</div>

<main id="main">
  <section class="pane">
    <div class="pane-label">
      <span>main_section_first-of-type.html</span>
      <span class="tag source">SOURCE (reproduction)</span>
    </div>
    <iframe src="source.html" id="iframe-source"></iframe>
  </section>
  <section class="pane">
    <div class="pane-label">
      <span>hero-noma.html</span>
      <span class="tag rebrand">REBRAND</span>
    </div>
    <iframe src="hero-noma.html" id="iframe-rebrand"></iframe>
  </section>
</main>

<script>
  const main = document.getElementById('main');
  const buttons = document.querySelectorAll('nav button');
  const paneSource = document.querySelectorAll('.pane')[0];
  const paneRebrand = document.querySelectorAll('.pane')[1];
  buttons.forEach(b => b.addEventListener('click', () => {
    buttons.forEach(x => x.classList.remove('active'));
    b.classList.add('active');
    const view = b.dataset.view;
    if (view === 'split') {
      main.classList.remove('single');
      paneSource.style.display = ''; paneRebrand.style.display = '';
    } else if (view === 'source') {
      main.classList.add('single');
      paneSource.style.display = ''; paneRebrand.style.display = 'none';
    } else {
      main.classList.add('single');
      paneSource.style.display = 'none'; paneRebrand.style.display = '';
    }
  }));
</script>
</body>
</html>
