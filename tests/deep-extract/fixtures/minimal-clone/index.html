<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Minimal Fixture</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main>
    <section class="hero-wrap">
      <h1>Bold Hero Title</h1>
      <p class="tagline">A minimal tagline for the hero section.</p>
      <img src="./assets/logo.svg" alt="logo">
    </section>

    <section class="services-grid">
      <h2>What We Do</h2>
      <div class="service-item"><h3>Branding</h3><p>Short pitch one.</p></div>
      <div class="service-item"><h3>Design</h3><p>Short pitch two.</p></div>
      <div class="service-item"><h3>Motion</h3><p>Short pitch three.</p></div>
    </section>

    <section class="portfolio-grid">
      <h2>Selected Work</h2>
      <a href="#"><img src="./assets/logo.svg" alt="project-1"><h3>Project Alpha</h3></a>
      <a href="#"><img src="./assets/logo.svg" alt="project-2"><h3>Project Beta</h3></a>
      <a href="#"><img src="./assets/logo.svg" alt="project-3"><h3>Project Gamma</h3></a>
    </section>

    <section class="contact-block">
      <h2>Get In Touch</h2>
      <form><input type="email" placeholder="Email"><button>Send</button></form>
      <script>document.querySelector('button')?.addEventListener('click', () => {});</script>
    </section>
  </main>

  <footer class="site-footer">
    <p>&copy; 2026 Minimal Fixture</p>
  </footer>
</body>
</html>
